<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./Login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <title>Login</title>
    <style>
      .login-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        width: clamp(110px, 22vw, 160px);
        margin: 0 auto 18px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        transition:
          transform 0.25s ease,
          opacity 0.25s ease;
      }

      .login-brand:hover {
        transform: translateY(-2px);
        opacity: 0.92;
      }

      .login-brand img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: contain;
      }

      .or {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin: 16px 0;
        color: #cbd5e1;
        font-size: clamp(13px, 2.6vw, 15px);
        font-weight: 600;
        line-height: 1;
        text-align: center;
        text-transform: lowercase;
      }

      .or::before,
      .or::after {
        content: "";
        flex: 1;
        max-width: 130px;
        height: 1px;
        background: rgba(148, 163, 184, 0.28);
      }

      .form-options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 20px;
      }

      .remember-me {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #cbd5e1;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        user-select: none;
      }

      .remember-me input {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: #00c6ff;
        cursor: pointer;
      }

      .form-options .forgot {
        margin-bottom: 0;
        white-space: nowrap;
      }

      @media (max-width: 560px) {
        .login-brand {
          width: clamp(96px, 38vw, 130px);
          margin-bottom: 14px;
        }

        .or {
          gap: 10px;
          margin: 14px 0;
        }

        .form-options {
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
        }

        .form-options .forgot {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    
    <a href="index.html" class="back-home"> ← Back to Home </a>

    <div class="container">
      <div class="logo">
        <a class="login-brand" href="index.html" aria-label="Stackly home">
      <img src="./Images/Stackly_logo.webp" alt="Stackly Logo" />
    </a>
        <p>Supply Chain Management Portal</p>
      </div>

      <div class="user-tabs">
        <button class="active" onclick="showForm('vendor')">Vendor</button>

        <button onclick="showForm('operations')">Operations</button>
      </div>

      <!-- Vendor Login -->
      <form id="vendorForm" class="login-form">
        <input type="email" placeholder="Vendor Email" required />

        <div class="password-field">
          <input
            type="password"
            class="password-input"
            placeholder="Password"
            required
          />
          <button
            type="button"
            class="password-toggle"
            aria-label="Show password"
          >
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <input type="text" placeholder="Vendor ID" required />

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="rememberVendor" />
            <span>Remember me</span>
          </label>
          <a href="Not found.html" class="forgot"> Forgot Password? </a>
        </div>

        <button type="submit" class="login-btn">Vendor Login</button>

        <h3 class="or">or</h3>

        <a
          href="https://accounts.google.com/"
          class="google-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-google"></i> Continue with Google
        </a>


        <p class="signup-text">
          New to Stackly?
          <a href="Signup.html">Sign Up</a>
        </p>
      </form>

      <!-- Operations Login -->
      <form id="operationsForm" class="login-form hidden">
        <input type="email" placeholder="Corporate Email" required />

        <div class="password-field">
          <input
            type="password"
            class="password-input"
            placeholder="Password"
            required
          />
          <button
            type="button"
            class="password-toggle"
            aria-label="Show password"
          >
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <select>
          <option>Select Department</option>
          <option>Warehouse</option>
          <option>Transportation</option>
          <option>Procurement</option>
          <option>Planning</option>
        </select>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="rememberOperations" />
            <span>Remember me</span>
          </label>
          <a href="Not found.html" class="forgot"> Forgot Password? </a>
        </div>

        <button type="submit" class="login-btn">Operations Login</button>

        <h3 class="or">or</h3>

        <a
          href="https://accounts.google.com/"
          class="google-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-google"></i> Continue with Google
        </a>

        <p class="signup-text">
          Need an account?
          <a href="Signup.html">Sign Up</a>
        </p>
      </form>

      <div class="portal-features">
        <div>📦 Track Shipments</div>
        <div>🏭 Warehouse Visibility</div>
        <div>🚚 Fleet Management</div>
        <div>📊 Inventory Analytics</div>
      </div>
    </div>

    <script src="Login.js"></script>
  </body>
</html>
