<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./Login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <title>Login</title>
    <style>
      .login-brand {
        position: absolute;
        top: 68px;
        left: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 150px;
        min-height: 58px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
        z-index: 10;
      }

      .login-brand:hover {
        transform: translateY(-2px);
        box-shadow: none;
      }

      .login-brand img {
        display: block;
        max-width: 120px;
        width: 100%;
        height: auto;
        object-fit: contain;
      }

      @media (max-width: 560px) {
        .login-brand {
          position: static;
          margin: 18px auto 0;
        }
      }
    </style>
  </head>
  <body>
    <a class="login-brand" href="index.html" aria-label="Stackly home">
      <img src="./Images/Stackly_logo.webp" alt="Stackly Logo" />
    </a>
    <a href="index.html" class="back-home"> ← Back to Home </a>

    <div class="container">
      <div class="logo">
        <h2>STACKLY SCM</h2>
        <p>Supply Chain Management Portal</p>
      </div>

      <div class="user-tabs">
        <button class="active" onclick="showForm('vendor')">Vendor</button>

        <button onclick="showForm('operations')">Operations</button>
      </div>

      <!-- Vendor Login -->
      <form id="vendorForm" class="login-form">
        <input type="email" placeholder="Vendor Email" required />

        <div class="password-field">
          <input
            type="password"
            class="password-input"
            placeholder="Password"
            required
          />
          <button
            type="button"
            class="password-toggle"
            aria-label="Show password"
          >
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <input type="text" placeholder="Vendor ID" required />

        <a href="Not found.html" class="forgot"> Forgot Password? </a>

        <a
          href="https://accounts.google.com/"
          class="google-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-google"></i> Continue with Google
        </a>

        <button type="submit" class="login-btn">Vendor Login</button>

        <p class="signup-text">
          New to Stackly?
          <a href="Signup.html">Sign Up</a>
        </p>
      </form>

      <!-- Operations Login -->
      <form id="operationsForm" class="login-form hidden">
        <input type="email" placeholder="Corporate Email" required />

        <div class="password-field">
          <input
            type="password"
            class="password-input"
            placeholder="Password"
            required
          />
          <button
            type="button"
            class="password-toggle"
            aria-label="Show password"
          >
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <select>
          <option>Select Department</option>
          <option>Warehouse</option>
          <option>Transportation</option>
          <option>Procurement</option>
          <option>Planning</option>
        </select>

        <a href="Not found.html" class="forgot"> Forgot Password? </a>

        <a
          href="https://accounts.google.com/"
          class="google-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-google"></i> Continue with Google
        </a>

        <button type="submit" class="login-btn">Operations Login</button>

        <p class="signup-text">
          Need an account?
          <a href="Signup.html">Sign Up</a>
        </p>
      </form>

      <div class="portal-features">
        <div>📦 Track Shipments</div>
        <div>🏭 Warehouse Visibility</div>
        <div>🚚 Fleet Management</div>
        <div>📊 Inventory Analytics</div>
      </div>
    </div>

    <script src="Login.js"></script>
  </body>
</html>
